<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entropy AI - Transforming Chaos into Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #1a1a2e;
      --bg-tertiary: #16213e;
      --accent-primary: #00d4ff;
      --accent-secondary: #7c3aed;
      --accent-tertiary: #f59e0b;
      --glass-light: rgba(255, 255, 255, 0.08);
      --glass-medium: rgba(255, 255, 255, 0.12);
      --glass-dark: rgba(255, 255, 255, 0.04);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.8);
      --text-muted: rgba(255, 255, 255, 0.6);
      --shadow-intense: 0 25px 50px rgba(0, 0, 0, 0.8);
      --shadow-glow: 0 0 50px rgba(0, 212, 255, 0.3);
      --border-glow: rgba(0, 212, 255, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:
        radial-gradient(ellipse at top left, rgba(124, 58, 237, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at center, rgba(245, 158, 11, 0.05) 0%, transparent 70%),
        linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      position: relative;
    }

    /* Animated background particles */
    .bg-particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent-primary);
      border-radius: 50%;
      animation: float-particle 20s infinite ease-in-out;
      opacity: 0.4;
    }

    @keyframes float-particle {

      0%,
      100% {
        transform: translateY(0px) rotate(0deg);
        opacity: 0.4;
      }

      25% {
        transform: translateY(-20px) rotate(90deg);
        opacity: 0.8;
      }

      50% {
        transform: translateY(-40px) rotate(180deg);
        opacity: 0.2;
      }

      75% {
        transform: translateY(-20px) rotate(270deg);
        opacity: 0.6;
      }
    }

    /* Pulse glow animation */
    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: var(--shadow-glow);
      }

      50% {
        box-shadow: 0 0 80px rgba(0, 212, 255, 0.5);
      }
    }

    /* Enhanced Glassmorphism */
    .glass-card {
      background: linear-gradient(135deg, var(--glass-medium), var(--glass-dark));
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-light);
      box-shadow: var(--shadow-intense);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .glass-card:hover::before {
      opacity: 0.05;
    }

    /* Gradient Text for Headings */
    .gradient-heading {
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-primary) 50%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Primary CTA Button with Glow */
    .cta-button {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: #ffffff;
      border: none;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-glow);
    }

    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 100px rgba(0, 212, 255, 0.6);
      color: #ffffff;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent-tertiary));
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .cta-button:hover::before {
      opacity: 1;
    }

    .cta-button span {
      position: relative;
      z-index: 1;
    }

    /* Launch Badge with Cyan Glow */
    .launch-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--glass-light), var(--glass-dark));
      border: 1px solid var(--border-glow);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-primary);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-glow);
      animation: pulse-glow 3s infinite ease-in-out;
    }

    /* Feature/Service Card Hover Effect */
    .feature-card,
    .service-card {
      transition: all 0.3s ease;
    }

    .feature-card:hover,
    .service-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-intense);
    }

    /* Form Input Focus */
    .form-input:focus {
      outline: none;
      border-color: var(--accent-primary) !important;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3) !important;
    }

    /* Nav Link Underline Animation */
    .nav-link {
      position: relative;
      transition: color 0.3s ease;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-primary);
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* Ensure content is above background effects */
    /* Form Input Styling */
    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      color: var(--text-primary);
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent-primary);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
    }

    .input-field::placeholder {
      color: var(--text-muted);
    }

    .input-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    /* Selection color */
    ::selection {
      background: var(--accent-primary);
      color: var(--bg-primary);
    }

    /* Smooth scroll */
    html {
      scroll-behavior: smooth;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.21.0",

    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react-dom": "https://aistudiocdn.com/react-dom@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
